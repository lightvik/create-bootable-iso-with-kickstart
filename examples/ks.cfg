#version=RHEL9
# ==============================================================
# KICKSTART.CFG — максимально полный пример с комментариями
# Совместимость: RHEL/CentOS/AlmaLinux/Rocky 8-9, Fedora 38+
# ==============================================================


# ==============================================================
# РАЗДЕЛ 1: СПОСОБ УСТАНОВКИ
# ==============================================================

# Режим: install — новая установка; upgrade — обновление существующей
install

# --- Источник дистрибутива (выбрать ОДИН) ---

# Установка с CD/DVD-привода
cdrom

# Установка с локального диска (ISO-образ)
# harddrive --partition=sda1 --dir=/path/to/iso/

# Установка по сети через HTTP/HTTPS/FTP
# url --url="http://mirror.example.com/rhel9/BaseOS/x86_64/os/"
# url --url="https://mirror.example.com/rhel9/" --noverifyssl   # отключить проверку TLS

# Установка через NFS
# nfs --server=192.168.1.1 --dir=/exports/rhel9

# Установка из live-образа (rootfs или squashfs)
# liveimg --url="http://server/image.tar.xz"

# --- Режим интерфейса установщика (выбрать ОДИН) ---

# Текстовый режим (рекомендуется для серверов и автоматизации)
text

# Графический режим (требует X11)
# graphical

# Режим командной строки (полностью неинтерактивный, нет псевдографики)
# cmdline

# Не запускать X-сервер на установленной системе (для серверов)
skipx

# Принять лицензионное соглашение EULA без интерактивного подтверждения
eula --agreed

# Не показывать окна мастера "первого запуска" (Setup Agent) после перезагрузки
firstboot --disabled


# ==============================================================
# РАЗДЕЛ 2: ЛОКАЛЬ, ЯЗЫК, ВРЕМЯ
# ==============================================================

# Язык системы и установщика. Формат: <язык>_<страна>.<кодировка>
lang ru_RU.UTF-8
# Для добавления доп. поддержки языков: --addsupport=en_US.UTF-8,de_DE.UTF-8

# Раскладка клавиатуры
# --vckeymap    — консольная раскладка (виртуальная консоль)
# --xlayouts    — список раскладок X11 через запятую
# --switch      — горячая клавиша переключения раскладок
keyboard --vckeymap=ru --xlayouts=ru,us --switch=grp:alt_shift_toggle

# Часовой пояс
# --utc   — хранить время в BIOS/RTC как UTC (рекомендуется)
# --ntpservers — указать NTP-серверы (через запятую)
timezone Europe/Moscow --utc --ntpservers=0.ru.pool.ntp.org,1.ru.pool.ntp.org


# ==============================================================
# РАЗДЕЛ 3: СЕТЬ
# ==============================================================

# Основной интерфейс со статическим IP
# --bootproto   — dhcp | static | none | ibft (iSCSI Boot Firmware Table)
# --ip          — IP-адрес (при static)
# --netmask     — маска подсети
# --gateway     — шлюз по умолчанию
# --nameserver  — DNS-серверы через запятую
# --ipv6        — auto | dhcp | <адрес/префикс> | ignore
# --device      — имя интерфейса (eth0, ens3, enp2s0 и т.д.) или MAC
# --onboot      — поднимать при старте системы
# --hostname    — FQDN-имя хоста
# --nodefroute  — не устанавливать маршрут по умолчанию (для доп. интерфейсов)
# --mtu         — MTU (по умолчанию 1500)
# --vlanid      — ID VLAN (создаёт интерфейс eth0.100)
network --bootproto=static \
        --ip=192.168.1.100 \
        --netmask=255.255.255.0 \
        --gateway=192.168.1.1 \
        --nameserver=192.168.1.1,8.8.8.8 \
        --ipv6=auto \
        --device=eth0 \
        --onboot=yes \
        --hostname=server01.example.com

# Дополнительный интерфейс по DHCP
# network --bootproto=dhcp --device=eth1 --onboot=yes --nodefroute

# Бондинг (агрегация каналов)
# network --device=bond0 --bondslaves=eth0,eth1 --bondopts=mode=active-backup,miimon=100 \
#         --bootproto=static --ip=192.168.1.100 --netmask=255.255.255.0 --gateway=192.168.1.1

# VLAN
# network --device=eth0.100 --vlanid=100 --bootproto=dhcp --onboot=yes


# ==============================================================
# РАЗДЕЛ 4: АУТЕНТИФИКАЦИЯ И БЕЗОПАСНОСТЬ
# ==============================================================

# Настройка системы аутентификации (RHEL 8/9)
# Профили: sssd | winbind | nis | minimal
# --force — применить даже если уже настроено
authselect select sssd --force

# RHEL 7 и старше (устарело в RHEL 8):
# auth --enableshadow --passalgo=sha512 --enablefingerprint --enablekrb5 \
#      --krb5realm=EXAMPLE.COM --krb5kdc=kdc.example.com

# Режим SELinux
# --enforcing   — блокировать нарушения политики (production)
# --permissive  — только логировать нарушения (отладка)
# --disabled    — полностью отключить SELinux
selinux --enforcing

# Настройка firewalld
# --enabled / --disabled     — включить или выключить
# --service     — разрешить сервис по имени (из /etc/services или firewalld)
# --port        — разрешить конкретный порт: --port=8080:tcp
# --trust       — интерфейс в зону trusted
# --use-system-defaults — использовать настройки по умолчанию
firewall --enabled --service=ssh,cockpit
# firewall --enabled --port=443:tcp --port=8080:tcp --service=http,https
# firewall --disabled


# ==============================================================
# РАЗДЕЛ 5: ПАРОЛИ ROOT И ПОЛЬЗОВАТЕЛЕЙ
# ==============================================================

# Пароль root
# --iscrypted   — передаётся уже хешированный пароль (SHA-512)
# --plaintext   — открытый текст (только для тестовых стендов!)
# --lock        — заблокировать вход под root (только sudo)
#
# Генерация хеша SHA-512:
#   python3 -c "import crypt; print(crypt.crypt('MyPass', crypt.mksalt(crypt.METHOD_SHA512)))"
#   или: openssl passwd -6 'MyPass'
rootpwd --iscrypted $6$rounds=500000$randomsalt123$HASHHASHHASHHASHHASHHASHHASHHASHHASHHASHHASHHASHHASHHASHHASHHASHHASHHASH

# Заблокировать root и работать только через sudo:
# rootpwd --lock


# ==============================================================
# РАЗДЕЛ 6: ГРУППЫ И ПОЛЬЗОВАТЕЛИ
# ==============================================================

# Создать группу
# --name    — имя группы
# --gid     — числовой GID (необязательно)
group --name=admins --gid=1001
group --name=developers --gid=1002

# Создать пользователя
# --name        — имя (login)
# --uid         — числовой UID
# --gid         — основная группа (числовой GID или имя)
# --groups      — дополнительные группы через запятую
# --password    — пароль (хеш или plain)
# --iscrypted   — пароль передаётся хешем
# --gecos       — поле GECOS (полное имя, отображается в finger/id)
# --homedir     — путь к домашней директории (по умолчанию /home/<name>)
# --shell       — оболочка по умолчанию
# --nohome      — не создавать домашний каталог
# --lock        — создать заблокированного пользователя (нет пароля)
user --name=admin \
     --uid=1001 \
     --gid=1001 \
     --groups=admins,wheel \
     --password=$6$rounds=500000$salt$HASHHASHHASHHASHHASH \
     --iscrypted \
     --gecos="System Administrator" \
     --homedir=/home/admin \
     --shell=/bin/bash

# Сервисный пользователь без логина
user --name=appuser --uid=2001 --shell=/sbin/nologin --nohome --lock

# SSH-ключ для пользователя (добавляется в ~/.ssh/authorized_keys)
# Синтаксис: sshkey --username=<имя> "<публичный ключ>"
sshkey --username=admin "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI... admin@workstation"


# ==============================================================
# РАЗДЕЛ 7: ЗАГРУЗЧИК (BOOTLOADER)
# ==============================================================

# --location    — mbr | partition | none | boot
#                 mbr       — в MBR диска (стандарт для BIOS)
#                 partition — в загрузочный раздел
#                 none      — не устанавливать загрузчик
# --boot-drive  — диск, куда записывать загрузчик
# --timeout     — пауза меню GRUB в секундах
# --append      — добавить параметры к строке ядра
# --password    — пароль GRUB (хеш из grub2-mkpasswd-pbkdf2)
# --iscrypted   — пароль передаётся в виде pbkdf2-хеша
# --driveorder  — порядок дисков в BIOS
bootloader --location=mbr \
           --boot-drive=sda \
           --timeout=5 \
           --append="quiet crashkernel=auto audit=1 ipv6.disable=1"
# bootloader --location=mbr --boot-drive=sda \
#            --password=$grub2$pbkdf2$sha512$10000$SALTSALTSALT$HASH \
#            --iscrypted


# ==============================================================
# РАЗДЕЛ 8: РАЗМЕТКА ДИСКОВ
# ==============================================================

# ignoredisk — не трогать указанные диски при установке
# --only-use  — работать ТОЛЬКО с перечисленными дисками
# --drives    — игнорировать перечисленные диски
ignoredisk --only-use=sda

# zerombr — обнулить MBR на всех дисках (снять защиту от перезаписи)
zerombr

# clearpart — удалить разделы перед созданием новых
# --all         — удалить все разделы
# --linux       — удалить только linux-разделы
# --none        — ничего не удалять (только создавать)
# --drives      — список дисков через запятую
# --initlabel   — инициализировать таблицу разделов (GPT/MBR)
# --disklabel   — тип таблицы: gpt | msdos
clearpart --all --drives=sda --initlabel --disklabel=gpt

# --- Создание разделов: команда part / partition ---
# --fstype     — тип ФС: xfs, ext4, swap, vfat, efi, btrfs, lvmpv, lvmvg
# --size       — минимальный размер в МБ
# --grow       — занять всё доступное место (используется с --maxsize)
# --maxsize    — максимальный размер при --grow (МБ)
# --asprimary  — создать как первичный раздел (только MBR)
# --ondisk     — на каком физическом диске создать
# --ondrive    — синоним --ondisk
# --label      — метка раздела
# --fsoptions  — параметры монтирования (noatime, noexec и т.д.)
# --noformat   — не форматировать (использовать существующую ФС)
# --onpart     — использовать уже существующий раздел
# --encrypted  — шифровать раздел (LUKS)
# --passphrase — фраза-пароль шифрования
# --luks-version — версия LUKS: luks1 | luks2
# --pbkdf      — pbkdf2 | argon2i | argon2id
# --cipher     — алгоритм шифрования: aes-xts-plain64

# /boot/efi — для UEFI-систем (обязателен при GPT + UEFI)
part /boot/efi --fstype=efi  --size=512  --ondisk=sda --asprimary

# /boot — неизменяемый раздел для ядра (не шифруется!)
part /boot     --fstype=xfs  --size=1024 --ondisk=sda --asprimary

# Physical Volume для LVM (с шифрованием LUKS2)
part pv.01     --fstype=lvmpv --size=1 --grow --ondisk=sda \
               --encrypted --passphrase=MyDiskPassphrase \
               --luks-version=luks2 --pbkdf=argon2id

# --- Volume Group ---
# --pesize  — размер physical extent в КБ (4096 = 4 МБ, default)
volgroup vg_root pv.01 --pesize=4096

# --- Logical Volumes ---
# --vgname  — имя volume group
# --name    — имя логического тома
# --size    — размер в МБ
# --grow    — занять остаток VG
# --percent — размер в % от VG: --percent=50
# --fsoptions — параметры монтирования ФС
logvol swap        --vgname=vg_root --name=lv_swap    --fstype=swap --size=4096
logvol /           --vgname=vg_root --name=lv_root    --fstype=xfs  --size=20480
logvol /var        --vgname=vg_root --name=lv_var     --fstype=xfs  --size=10240
logvol /var/log    --vgname=vg_root --name=lv_varlog  --fstype=xfs  --size=5120
logvol /var/log/audit --vgname=vg_root --name=lv_audit --fstype=xfs --size=2048
logvol /home       --vgname=vg_root --name=lv_home    --fstype=xfs  --size=10240 \
                   --fsoptions="defaults,nodev"
logvol /tmp        --vgname=vg_root --name=lv_tmp     --fstype=xfs  --size=5120 \
                   --fsoptions="defaults,nodev,nosuid,noexec"
logvol /opt        --vgname=vg_root --name=lv_opt     --fstype=xfs  --size=1 --grow

# --- Альтернатива: autopart (автоматическая разметка) ---
# --type    — plain | lvm | thinp | btrfs
# --fstype  — тип ФС для разделов
# --encrypted / --passphrase — шифровать всё
# --nohome  — не создавать /home
# --noboot  — не создавать /boot
# --noswap  — не создавать swap
# autopart --type=lvm --fstype=xfs --encrypted --passphrase=MyPass --nohome

# --- RAID (программный) ---
# Пример RAID1 из двух дисков:
# clearpart --all --drives=sda,sdb --initlabel
# part raid.11 --size=512   --asprimary --ondrive=sda   # /boot-зеркало 1
# part raid.12 --size=512   --asprimary --ondrive=sdb   # /boot-зеркало 2
# part raid.21 --size=1     --grow      --ondrive=sda   # LVM-зеркало 1
# part raid.22 --size=1     --grow      --ondrive=sdb   # LVM-зеркало 2
#
# --device  — имя md-устройства (md0, md1, ...)
# --level   — уровень RAID: RAID0 | RAID1 | RAID5 | RAID6 | RAID10
# --spares  — количество запасных дисков
# raid /boot  --device=md0 --level=RAID1 --fstype=xfs raid.11 raid.12
# raid pv.01  --device=md1 --level=RAID1 --fstype=lvmpv raid.21 raid.22
# volgroup vg_root pv.01
# ... logvol как выше ...

# --- Btrfs (Fedora) ---
# btrfs none --data=RAID1 --metadata=RAID1 btrfs.01 btrfs.02
# btrfs /    --subvol --name=root LABEL=btrfs_pool
# btrfs /home --subvol --name=home LABEL=btrfs_pool

# --- iSCSI ---
# iscsiname iqn.2026-01.com.example:initiator01
# iscsi --ipaddr=192.168.1.200 --port=3260 \
#       --target=iqn.2026-01.com.example:target01 \
#       --user=iscsi_user --password=iscsi_pass \
#       --reverse-user=tgt_user --reverse-password=tgt_pass


# ==============================================================
# РАЗДЕЛ 9: ПАКЕТЫ
# ==============================================================

# Флаги секции %packages:
# --ignoremissing   — не падать, если пакет не найден в репо
# --excludedocs     — не устанавливать man-страницы и документацию
# --nocore          — не включать группу @core (опасно!)
# --inst-langs      — установить только указанные локали: --inst-langs=ru,en
# --multilib        — установить 32-битные пакеты (x86_64 + i686)

%packages --ignoremissing --excludedocs

# --- Окружение (одно на выбор) ---
# @^minimal-environment          — только самый минимум
# @^server-product-environment   — серверное окружение
# @^workstation-product-environment — рабочая станция
@^minimal-environment

# --- Группы пакетов ---
# Префикс @ означает группу; @^ — окружение
@core
@base
@system-tools
# @development          — gcc, make, git и инструменты разработки
# @network-tools        — сетевые утилиты
# @security-tools       — SELinux tools, crypto, AIDE
# @gnome-desktop        — рабочий стол GNOME
# @virtualization-host  — KVM/QEMU гипервизор

# --- Отдельные пакеты ---
vim-enhanced            # полная версия vim (не minimal)
git                     # система контроля версий
curl                    # HTTP-клиент
wget                    # загрузчик файлов
rsync                   # синхронизация файлов
net-tools               # ifconfig, netstat (legacy)
bind-utils              # dig, nslookup, host
lsof                    # список открытых файлов и сокетов
strace                  # трассировка системных вызовов
tcpdump                 # захват сетевого трафика
nmap                    # сканер портов
htop                    # интерактивный мониторинг процессов
tmux                    # мультиплексор терминала
bash-completion         # автодополнение bash
chrony                  # NTP-клиент (замена ntpd)
tuned                   # профили производительности
aide                    # мониторинг целостности файлов
audit                   # подсистема аудита ядра
policycoreutils-python-utils  # semanage, audit2allow
python3                 # интерпретатор Python 3
tar                     # архиватор
gzip bzip2 xz           # компрессоры
sudo                    # повышение привилегий
openssl                 # криптографические утилиты

# --- Исключить пакеты (префикс -) ---
-fprintd                # сканер отпечатков (не нужен на сервере)
-fprintd-pam
-abrt                   # автоматический репортер падений
-abrt-addon-ccpp
-abrt-addon-kerneloops
-abrt-addon-python
-sendmail               # почтовый сервер (заменить на postfix при необходимости)
-avahi                  # mDNS/Bonjour (не нужен на сервере)
-cups                   # система печати

%end


# ==============================================================
# РАЗДЕЛ 10: СЕРВИСЫ
# ==============================================================

# Управление сервисами systemd
# --enabled  — включить (запускать при старте)
# --disabled — выключить
services --enabled=sshd,chronyd,auditd,tuned,firewalld
services --disabled=bluetooth,cups,avahi-daemon,rpcbind,postfix


# ==============================================================
# РАЗДЕЛ 11: ДОПОЛНИТЕЛЬНЫЕ РЕПОЗИТОРИИ
# ==============================================================

# --name        — уникальное имя репозитория (используется как repo id)
# --baseurl     — URL до директории с repodata/
# --mirrorlist  — URL к файлу со списком зеркал
# --cost        — приоритет (меньше = выше приоритет, default=1000)
# --noverifyssl — не проверять TLS-сертификат
# --proxy       — HTTP-прокси: --proxy=http://proxy.example.com:3128
# --includepkgs — установить ТОЛЬКО эти пакеты из репо (через запятую)
# --excludepkgs — исключить пакеты из репо

# repo --name=epel \
#      --baseurl=https://dl.fedoraproject.org/pub/epel/9/Everything/x86_64/ \
#      --cost=200

# repo --name=internal \
#      --baseurl=http://repo.internal.example.com/rhel9/ \
#      --noverifyssl \
#      --cost=100


# ==============================================================
# РАЗДЕЛ 12: ЛОГИРОВАНИЕ УСТАНОВЩИКА
# ==============================================================

# Перенаправить лог Anaconda на удалённый syslog-сервер
# --host    — IP или FQDN syslog-сервера
# --port    — порт (default: 514)
# --level   — уровень: debug | info | warning | error | critical
logging --host=192.168.1.50 --port=514 --level=info


# ==============================================================
# РАЗДЕЛ 13: ДЕЙСТВИЕ ПОСЛЕ УСТАНОВКИ
# ==============================================================

# Одна из команд (выбрать ОДНУ):
# reboot     — перезагрузить после установки
#   --eject  — извлечь CD/DVD перед перезагрузкой
# poweroff   — выключить питание
# halt       — остановить систему (без выключения питания)
# shutdown   — аналог halt
reboot --eject


# ==============================================================
# РАЗДЕЛ 14: %pre — скрипт ДО установки
# ==============================================================
# Выполняется в среде initrd до монтирования целевой ФС.
# Нет доступа к chroot, доступен только /tmp и RAM.
# Используется для: динамического определения дисков, настройки сети,
# декрипта vault-секретов, генерации include-файлов.
#
# Флаги:
# --interpreter — /usr/bin/python3 | /usr/bin/perl | /usr/bin/bash (default)
# --log         — путь к лог-файлу внутри initrd
# --erroronfail — прервать установку при ненулевом коде возврата

%pre --log=/tmp/ks-pre.log --erroronfail
#!/bin/bash
set -euo pipefail

# Динамически определить первый доступный диск и сгенерировать
# дополнительный ks-фрагмент для использования правильного диска.
# Это нужно, когда имя диска неизвестно заранее (sda/vda/nvme0n1).
DISK=$(lsblk -dn -o NAME,TYPE | awk '$2=="disk"{print $1; exit}')
echo "Detected disk: ${DISK}" >> /tmp/ks-pre.log

# Сгенерировать include-файл с командами разметки
cat > /tmp/part-include.ks << EOF
ignoredisk --only-use=${DISK}
zerombr
clearpart --all --drives=${DISK} --initlabel --disklabel=gpt
part /boot/efi --fstype=efi  --size=512  --ondisk=${DISK} --asprimary
part /boot     --fstype=xfs  --size=1024 --ondisk=${DISK} --asprimary
part pv.01     --fstype=lvmpv --size=1 --grow --ondisk=${DISK}
EOF

echo "Pre-script completed successfully" >> /tmp/ks-pre.log
%end

# Подключить сгенерированный include-файл
# %include /tmp/part-include.ks


# ==============================================================
# РАЗДЕЛ 15: %post — скрипт ПОСЛЕ установки (в chroot)
# ==============================================================
# Выполняется после копирования всех файлов, в chroot новой системы.
# Сеть доступна. /mnt/sysimage/ — корень новой системы.
# Используется для настройки системы, которую нельзя описать декларативно.
#
# Флаги:
# --interpreter — /usr/bin/python3 | /usr/bin/perl и т.д.
# --log         — путь к лог-файлу (внутри chroot, т.е. в новой системе)
# --erroronfail — прервать установку при ошибке
# --nochroot    — не делать chroot (полезно для копирования файлов из initrd)

%post --log=/var/log/ks-post.log --erroronfail
#!/bin/bash
set -euo pipefail

echo "=== POST INSTALL STARTED: $(date) ===" | tee -a /var/log/ks-post.log

# ---- Настройка sudo ----
# Группа wheel без пароля (для автоматизации/ansible)
# Для продакшена лучше убрать NOPASSWD:
echo "%wheel  ALL=(ALL)  NOPASSWD: ALL" > /etc/sudoers.d/10-wheel
chmod 0440 /etc/sudoers.d/10-wheel

# ---- Ужесточение SSH ----
cat > /etc/ssh/sshd_config.d/99-hardening.conf << 'EOF'
# Запретить прямой вход root по SSH
PermitRootLogin no
# Разрешить только аутентификацию по ключу
PasswordAuthentication no
PubkeyAuthentication yes
AuthorizedKeysFile .ssh/authorized_keys
# Максимум попыток аутентификации на соединение
MaxAuthTries 3
# Разрыв соединения при неактивности: 300с * 2 = 10 мин
ClientAliveInterval 300
ClientAliveCountMax 2
# Отключить проброс X11 и TCP-туннели (не нужны на серверах)
X11Forwarding no
AllowTcpForwarding no
# Только протокол SSH v2
Protocol 2
# Баннер перед аутентификацией
Banner /etc/issue.net
EOF

# ---- Параметры ядра (безопасность) ----
cat > /etc/sysctl.d/99-security.conf << 'EOF'
# Запретить IP-форвардинг (если не роутер)
net.ipv4.ip_forward = 0
# Запретить отправку ICMP-редиректов
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
# Запретить приём ICMP-редиректов
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
# Запретить source routing
net.ipv4.conf.all.accept_source_route = 0
# Защита от SYN-flood
net.ipv4.tcp_syncookies = 1
# Ограничить доступ к dmesg
kernel.dmesg_restrict = 1
# Скрыть адреса ядра в /proc (защита от exploit'ов)
kernel.kptr_restrict = 2
# ASLR: рандомизация адресного пространства (max)
kernel.randomize_va_space = 2
# Запретить core dump для setuid-программ
fs.suid_dumpable = 0
EOF
sysctl --system >> /var/log/ks-post.log 2>&1

# ---- NTP (chrony) ----
cat > /etc/chrony.conf << 'EOF'
server 0.ru.pool.ntp.org iburst
server 1.ru.pool.ntp.org iburst
driftfile /var/lib/chrony/drift
makestep 1.0 3
rtcsync
logdir /var/log/chrony
EOF

# ---- Политика паролей (PAM/pwquality) ----
cat > /etc/security/pwquality.conf << 'EOF'
# Минимальная длина пароля
minlen = 12
# Минимум цифр
dcredit = -1
# Минимум букв в верхнем регистре
ucredit = -1
# Минимум букв в нижнем регистре
lcredit = -1
# Минимум спецсимволов
ocredit = -1
# Запретить повторение символов подряд
maxrepeat = 3
EOF

# ---- Параметры aging паролей ----
# PASS_MAX_DAYS — максимальный срок действия пароля (дней)
# PASS_MIN_DAYS — минимальный срок до смены пароля
# PASS_WARN_AGE — предупреждение за N дней до истечения
sed -i 's/^PASS_MAX_DAYS.*/PASS_MAX_DAYS   90/'  /etc/login.defs
sed -i 's/^PASS_MIN_DAYS.*/PASS_MIN_DAYS   1/'   /etc/login.defs
sed -i 's/^PASS_WARN_AGE.*/PASS_WARN_AGE   14/'  /etc/login.defs

# ---- Баннер входа ----
cat > /etc/issue << 'EOF'

  WARNING: Authorized access only!
  All activity is monitored and may be reported.
  Disconnect immediately if you are not an authorized user.

EOF
cp /etc/issue /etc/issue.net

# ---- AIDE (мониторинг целостности) ----
# Инициализировать базовую базу после установки всех пакетов
aide --init >> /var/log/ks-post.log 2>&1
mv /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz

# Еженедельная проверка через cron
echo "0 3 * * 0 root /usr/sbin/aide --check | mail -s 'AIDE Report $(hostname)' root" \
    > /etc/cron.d/aide-check

# ---- Настройка auditd ----
cat >> /etc/audit/rules.d/99-custom.rules << 'EOF'
# Аудит попыток изменить время
-a always,exit -F arch=b64 -S adjtimex -S settimeofday -k time-change
# Аудит изменений пользователей/групп
-w /etc/group  -p wa -k identity
-w /etc/passwd -p wa -k identity
-w /etc/shadow -p wa -k identity
-w /etc/sudoers -p wa -k identity
# Аудит попыток использования privileged-команд
-a always,exit -F path=/usr/bin/sudo -F perm=x -F auid>=1000 -F auid!=unset -k privileged
# Аудит сетевых соединений
-a always,exit -F arch=b64 -S connect -k network-connect
EOF

# ---- SELinux autorelabel после настройки ----
# При изменении контекстов файлов требуется переразметка при следующей загрузке
touch /.autorelabel

echo "=== POST INSTALL COMPLETED: $(date) ===" | tee -a /var/log/ks-post.log
%end


# ==============================================================
# РАЗДЕЛ 16: %post --nochroot — скрипт без chroot
# ==============================================================
# Доступен реальный корень (initrd) и новая система через /mnt/sysimage.
# Используется для копирования файлов из установочного носителя
# в целевую систему.

%post --nochroot --log=/mnt/sysimage/var/log/ks-post-nochroot.log
#!/bin/bash
set -euo pipefail

# Скопировать дополнительные конфиги с установочного носителя
if [ -d /run/install/repo/custom-configs/ ]; then
    cp -a /run/install/repo/custom-configs/. /mnt/sysimage/etc/
fi

# Скопировать лог pre-скрипта в систему для последующего анализа
cp /tmp/ks-pre.log /mnt/sysimage/var/log/ks-pre.log 2>/dev/null || true
%end


# ==============================================================
# РАЗДЕЛ 17: %onerror — обработка ошибок установки
# ==============================================================
# Выполняется при любой ошибке Anaconda.
# Удобно для уведомлений и сбора диагностики.

%onerror
#!/bin/bash
ERROR_LOG="/tmp/ks-error-$(date +%Y%m%d-%H%M%S).log"
echo "KICKSTART FAILED at $(date)" | tee "${ERROR_LOG}"
echo "Hostname: $(hostname)" >> "${ERROR_LOG}"
echo "Kernel: $(uname -r)" >> "${ERROR_LOG}"
journalctl -b --no-pager >> "${ERROR_LOG}" 2>/dev/null || true

# Отправить уведомление на мониторинг (если сеть доступна):
# curl -s -X POST "http://monitoring.example.com/api/alert" \
#      -d "host=$(hostname)&status=kickstart_failed&time=$(date +%s)" || true
%end


